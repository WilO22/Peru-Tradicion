<div class="flex h-screen">
  <aside class="w-64 bg-gray-900 text-white p-6 flex flex-col">
    <h2 class="text-2xl font-bold mb-6">Perú Tradición Admin</h2>

    <nav class="flex-1 space-y-2">
      <a routerLink="/admin/dashboard" 
         routerLinkActive="bg-indigo-600" 
         [routerLinkActiveOptions]="{exact: true}"
         class="sidebar-link flex items-center px-4 py-2 text-gray-300 hover:bg-gray-700 rounded-lg">
         <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1V10a1 1 0 011-1h4a1 1 0 011 1v10a1 1 0 001 1m-9-9h4" /></svg>
        Dashboard
      </a>
      <a routerLink="/admin/manage-costumes" 
         routerLinkActive="bg-indigo-600"
         class="sidebar-link flex items-center px-4 py-2 text-gray-300 hover:bg-gray-700 rounded-lg">
         <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10l8-4m0 0l-8-4m8 4H4" /></svg>
        Disfraces
      </a>
      </nav>

    <div class="mt-auto border-t border-gray-700 pt-4">
      <button (click)="handleLogout()" 
              class="w-full flex items-center justify-center px-4 py-2 text-gray-300 hover:bg-red-600 hover:text-white rounded-lg transition-colors duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-3"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Cerrar Sesión
      </button>
    </div>
  </aside>

  <main class="flex-1 p-10 bg-gray-100 overflow-y-auto">
    <router-outlet />
  </main>
</div>

<header class="bg-white shadow-md sticky top-0 z-40">
  <div class="container mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">
      <div class="flex-shrink-0">
        <a routerLink="/" class="text-2xl font-bold text-gray-800 flex items-center">
           Perú Tradición
        </a>
      </div>

      <nav class="hidden md:flex md:space-x-8">
        <a href="#"
           (click)="$event.preventDefault(); setRegionFilter('Todos')"
           [class.active-nav]="firestore.regionFilter() === 'Todos'"
           class="nav-link text-gray-600 hover:text-indigo-600 font-medium">Todos</a>
        <a href="#"
           (click)="$event.preventDefault(); setRegionFilter('Costa')"
           [class.active-nav]="firestore.regionFilter() === 'Costa'"
           class="nav-link text-gray-600 hover:text-indigo-600 font-medium">Costa</a>
        <a href="#"
           (click)="$event.preventDefault(); setRegionFilter('Sierra')"
           [class.active-nav]="firestore.regionFilter() === 'Sierra'"
           class="nav-link text-gray-600 hover:text-indigo-600 font-medium">Sierra</a>
        <a href="#"
           (click)="$event.preventDefault(); setRegionFilter('Selva')"
           [class.active-nav]="firestore.regionFilter() === 'Selva'"
           class="nav-link text-gray-600 hover:text-indigo-600 font-medium">Selva</a>
      </nav>

      <div class="flex items-center space-x-4">
        <a routerLink="/login"
           class="hidden sm:block text-gray-500 hover:text-indigo-600"
           title="Acceso Administrador">
           <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </a>

        </div>
    </div>
  </div>
  </header>

<div class="container mx-auto px-4 sm:px-6 lg:px-8 pt-8">
  @if (firestore.activeBanner(); as banner) {
    <section class="relative bg-gradient-to-r from-pink-500 to-red-500 rounded-2xl overflow-hidden text-white p-6 md:p-12 flex items-center min-h-[250px] md:min-h-[300px]">
      <div class="absolute inset-0 bg-black opacity-20"></div>
      <img [src]="banner.image" class="absolute inset-0 w-full h-full object-cover opacity-40" [alt]="banner.title">
      <div class="relative z-10 max-w-2xl">
        <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold mb-3 leading-tight tracking-tight">
          {{ banner.title }}
        </h1>
        <p class="text-base sm:text-lg md:text-xl mb-6">
          {{ banner.subtitle }}
        </p>
        <a href="#" class="bg-white text-pink-600 font-bold py-3 px-6 rounded-lg hover:bg-gray-100 transition duration-300 text-sm sm:text-base">
          {{ banner.buttonText }}
        </a>
      </div>
    </section>
  } @else {
    <div class="h-8"></div>
  }
</div>

<main class="container mx-auto p-4 min-h-screen">
  <router-outlet />
</main>

<footer class="bg-gray-800 text-white p-10 mt-10 text-center">
  &copy; {{ currentYear }} Perú Tradición. Todos los derechos reservados.
  </footer>

<header class="bg-white shadow-md sticky top-0 z-40">
  <div class="container mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">
      <div class="flex-shrink-0">
        <a href="#" class="text-2xl font-bold text-gray-800 flex items-center">
          Perú Tradición
        </a>
      </div>

      <nav class="hidden md:flex md:space-x-8">
        <a href="#" 
           (click)="$event.preventDefault(); setRegionFilter('Todos')"
           [class.active-nav]="firestore.regionFilter() === 'Todos'"
           class="nav-link text-gray-600 hover:text-indigo-600 font-medium">Todos</a>
        <a href="#" 
           (click)="$event.preventDefault(); setRegionFilter('Costa')"
           [class.active-nav]="firestore.regionFilter() === 'Costa'"
           class="nav-link text-gray-600 hover:text-indigo-600 font-medium">Costa</a>
        <a href="#" 
           (click)="$event.preventDefault(); setRegionFilter('Sierra')"
           [class.active-nav]="firestore.regionFilter() === 'Sierra'"
           class="nav-link text-gray-600 hover:text-indigo-600 font-medium">Sierra</a>
        <a href="#" 
           (click)="$event.preventDefault(); setRegionFilter('Selva')"
           [class.active-nav]="firestore.regionFilter() === 'Selva'"
           class="nav-link text-gray-600 hover:text-indigo-600 font-medium">Selva</a>
      </nav>
    </div>
  </div>
</header>

<main class="container mx-auto p-4 min-h-screen">
  <router-outlet />
</main>

<footer class="bg-gray-800 text-white p-10 mt-10 text-center">
  FOOTER PÚBLICO (Layout)
</footer>
